name: dido
description: AI-powered marketing tool for Tunisian social commerce sellers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization (built-in; v1 locked to French — see lib/main.dart)
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.1

  # Crash reporting / observability
  sentry_flutter: ^9.0.0
  sentry_dio: ^9.0.0

  # HTTP
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8
  pretty_dio_logger: ^1.3.1

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local Database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Deep links (Paymee return / cancel)
  app_links: ^6.3.2

  # Analytics
  posthog_flutter: ^4.4.1

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # UI & Animations
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  icons_plus: ^5.0.0

  # Utils
  intl: ^0.20.2
  crypto: ^3.0.3
  image: ^4.2.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800